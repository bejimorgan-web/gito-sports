name: gito_live_sports_mobile
description: Viewer-facing mobile live sports experience for GiTO Live Sports.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_local_notifications: ^17.2.4
  share_plus: 13.1.0
  timezone: ^0.9.4
  url_launcher: ^6.1.10
  video_player: ^2.7.1
  wakelock_plus: ^1.6.1
  google_mobile_ads: ^9.0.0
  firebase_core: ^2.24.0
  firebase_crashlytics: ^3.3.4
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_logo.png
    - assets/splash_image.png
